    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .image-bg {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background-color: #1a252f;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding-top: 56px;
    }
    .image-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }
    .image-bg > * {
      position: relative;
      z-index: 2;

    .mouse {
      width: 40px;
      height: 60px;
      border: 2px solid #fff;
      border-radius: 30px;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      transition: all 0.3s ease;
    }
    .mouse::before {
      content: '';
      width: 8px;
      height: 8px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #fff;
      border-radius: 50%;
      opacity: wheel 1.5s infinite;
    }
    @keyframes wheel {
      to {
        opacity: 0;
        top: 40px;
      }
    }
    .mouse.moved {
      width: 24px;
      height: 36px;
      bottom: 10px;
      right: 10px;
      left: auto;
      transform: none;
    }
    .mouse.moved::before {
      width: 6px;
      height: 6px;
      top: 6px;
    }
    @media (max-width: 640px) {
      .image-bg {
        padding-top: 48px;
      }
      .mouse {
        width: 32px;
        height: 48px;
        border-width: 2px;
        bottom: 10px;
      }
      .mouse::before {
        width: 6px;
        height: 6px;
        top: 8px;
      }
      @keyframes wheel {
        to {
          opacity: 0;
          top: 32px;
        }
      }
      .mouse.moved {
        width: 20px;
        height: 30px;
        bottom: 5px;
        right: 5px;
      }
      .mouse.moved::before {
        width: 5px;
        height: 5px;
        top: 5px;
      }

            try {
              const kWhValue = parseFloat(kWh);
              if (kWhValue > 0) {
                const kWp = (kWhValue / 130).toFixed(2);
                const cost = (kWp * 5000).toFixed(2);
                setResult({ kWp, cost });
              } else {
                alert('Insira um valor válido.');
              }
            } catch (error) {
              console.error('Erro ao calcular:', error);

        }
