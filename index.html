  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #1a2525;
      color: #e5e7eb;
    }
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .image-bg {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background-color: #1a2525;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding-top: 56px;
    }
    .image-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }
    .image-bg > * {
      position: relative;
      z-index: 2;
    }
    .mouse {
      width: 50px;
      height: 90px;
      border: 4px solid #ffffff;
      border-radius: 60px;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
    }
    .mouse::before {
      content: '';
      width: 12px;
      height: 12px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 1;
      animation: wheel 2s infinite;
    }
    @keyframes wheel {
      to {
        opacity: 0;
        top: 60px;
      }
    }
    @media (max-width: 640px) {
      .image-bg {
        padding-top: 48px;
      }
      .mouse {
        width: 40px;
        height: 72px;
        border-width: 3px;
        bottom: 10px;
      }
      .mouse::before {
        width: 10px;
        height: 10px;
        top: 8px;
      }
      @keyframes wheel {
        to {
          opacity: 0;
          top: 48px;
        }
      }
    }
    .scroll-smooth {
      scroll-behavior: smooth;
    }
    .text-shadow-lg {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .text-shadow-md {
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
    }
    .section {
      background-color: #2d3a3a;
    }
    .card {
      background-color: #2d3a3a;
      color: #e5e7eb;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    .card-content {
      background-color: transparent;
    }
    input, textarea {
      background-color: #3f4c4c;
      color: #e5e7eb;
      border-color: #4b5e5e;
    }
    input:focus, textarea:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 0.125em rgba(16, 185, 129, 0.25);
    }
    .button.is-success {
      background-color: #10b981;
    }
    .button.is-success:hover {
      background-color: #059669;
    }
    .button.is-warning {
      background-color: #facc15;
      color: #1a2525;
    }
    .button.is-warning:hover {
      background-color: #eab308;
    }
    a:hover {
      color: #facc15;
    }
    footer {
      background-color: #162020;
    }
    #error {
      color: #f87171;
      text-align: center;
      padding: 20px;
    }
    .logo-svg {
      width: 40px;
      height: 40px;
      vertical-align: middle;
    }
    .st0 {
      fill: #ffffff;
    }
    @media (max-width: 640px) {
      .logo-svg {
        width: 32px;
        height: 32px;
      }
    }
    .bank-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto;
    }
    @media (max-width: 640px) {
      .bank-logo {
        width: 48px;
        height: 48px;
      }
    }
  </style>

    document.addEventListener('DOMContentLoaded', () => {
      try {

        ];

        const mockTestimonials = [
          { nome: 'João Silva', cidade: 'São Paulo', depoimento: 'Reduzi minha conta em 70%!', foto: 'https://via.placeholder.com/100' },
          { nome: 'Maria Oliveira', cidade: 'Rio de Janeiro', depoimento: 'Serviço impecável!', foto: 'https://via.placeholder.com/100' },
          { nome: 'Carlos Souza', cidade: 'Belo Horizonte', depoimento: 'Instalação rápida e eficiente.', foto: 'https://via.placeholder.com/100' }
        ];

        function Header() {
          const [isOpen, setIsOpen] = React.useState(false);
          return React.createElement(
            'header',
            { className: 'navbar is-fixed-top has-background-success-dark has-text-white' },
            React.createElement(
              'div',
              { className: 'container' },
              React.createElement(
                'div',
                { className: 'navbar-brand' },
                React.createElement(
                  'a',
                  { href: '#home', className: 'navbar-item' },
                  React.createElement(
                    'svg',
                    { className: 'logo-svg', role: 'img', 'aria-label': 'Logo Eco Solares' },
                    React.createElement('use', { xlinkHref: '#lg-eco' })
                  )
                ),
                React.createElement(
                  'button',
                  {
                    className: `navbar-burger ${isOpen ? 'is-active' : ''}`,
                    onClick: () => setIsOpen(!isOpen)
                  },
                  React.createElement('span', null),

                )
              ),
              React.createElement(

                ['Home', 'Sobre', 'Serviços', 'Marcas', 'Testemunhos', 'Galeria', 'Financiamento', 'Contato'].map((item) =>
                  React.createElement(
                    'a',
                    {
                      key: item,
                      href: `#${item.toLowerCase()}`,
                      className: 'navbar-item has-text-white',
                      onClick: () => setIsOpen(false)
                    },
                    item
                  )
                )
              )
            )
          );
        }

        function SolarCalculator() {
          const [kWh, setKWh] = React.useState('');
          const [result, setResult] = React.useState(null);

          const calculate = () => {
            try {
              const kWhValue = parseFloat(kWh);
              if (kWhValue > 0) {
                const kWp = (kWhValue / 130).toFixed(2);
                const cost = (kWp * 5000).toFixed(2);
                setResult({ kWp, cost });
              } else {
                alert('Insira um valor válido maior que zero!');
              }
            } catch (error) {
              console.error('Erro na calculadora:', error);
              alert('Ocorreu um erro ao calcular. Tente novamente.');
            }
          };

          return React.createElement(
            'div',
            { className: 'section' },
            React.createElement(
              'div',
              { className: 'container' },
              React.createElement('h2', { className: 'title is-size-3 has-text-centered has-text-green fade-in' }, 'Calcule Sua Economia'),
              React.createElement(
                'div',
                { className: 'card' },
                React.createElement(
                  'div',
                  { className: 'card-content' },
                  React.createElement(
                    'div',
                    { className: 'field' },
                    React.createElement('label', { className: 'label' }, 'Consumo mensal (kWh)'),
                    React.createElement(
                      'div',
                      { className: 'control' },
                      React.createElement('input', {
                        type: 'number',
                        value: kWh,
                        onChange: (e) => setKWh(e.target.value),
                        placeholder: 'Ex.: 300',
                        className: 'input'
                      })
                    )
                  ),
                  React.createElement(
                    'div',
                    { className: 'field' },
                    React.createElement(
                      'div',
                      { className: 'control' },
                      React.createElement(
                        'button',
                        { onClick: calculate, className: 'button is-success is-fullwidth' },
                        'Calcular'
