<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco Solares</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- Swiper CSS -->
  <link href="https://unpkg.com/swiper@8/swiper-bundle.min.css" rel="stylesheet">
  <!-- Google Fonts (Roboto) -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <!-- Swiper JS -->
  <script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
  <!-- XLSX -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .image-bg {
      position: relative;
      width: 100%;
      height: 100vh; /* Ocupa exatamente a viewport */
      overflow: hidden;
      background-color: #f0f0f0; /* Fallback */
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mouse {
      width: 50px;
      height: 90px;
      border: 4px solid #fff;
      border-radius: 60px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    .mouse::before {
      content: '';
      width: 12px;
      height: 12px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #fff;
      border-radius: 50%;
      opacity: 1;
      animation: wheel 2s infinite;
    }
    @keyframes wheel {
      to {
        opacity: 0;
        top: 60px;
      }
    }
    /* Responsividade para o ícone de scroll down */
    @media (max-width: 640px) {
      .mouse {
        width: 30px;
        height: 60px;
        border-width: 3px;
      }
      .mouse::before {
        width: 8px;
        height: 8px;
        top: 8px;
      }
      @keyframes wheel {
        to {
          opacity: 0;
          top: 40px;
        }
      }
    }
    .scroll-smooth {
      scroll-behavior: smooth;
    }
    /* Sombra de texto para legibilidade */
    .text-shadow-lg {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .text-shadow-md {
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body class="scroll-smooth">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const images = [
      "https://images.unsplash.com/photo-1509389928833-fe62aef36deb?q=80&w=2012&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1574360773950-133867861ae9?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1497440001374-f26997328c1b?q=80&w=1932&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1558449028-b53a39d100fc?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1521618755572-156ae0cdd74d?q=80&w=2076&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1613665813446-82a78c468a1d?q=80&w=2058&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1497435334941-8c899ee9e8e9?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1589275776107-e193042128bd?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1629726797843-618688139f5a?q=80&w=2071&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1491677533189-49af044391ed?q=80&w=2073&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    ];

    const mockTestimonials = [
      { nome: 'João Silva', cidade: 'São Paulo', depoimento: 'Reduzi minha conta em 70%!', foto: 'https://via.placeholder.com/100' },
      { nome: 'Maria Oliveira', cidade: 'Rio de Janeiro', depoimento: 'Serviço impecável!', foto: 'https://via.placeholder.com/100' },
      { nome: 'Carlos Souza', cidade: 'Belo Horizonte', depoimento: 'Instalação rápida e eficiente.', foto: 'https://via.placeholder.com/100' }
    ];

    function Header() {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <header className="fixed top-0 w-full bg-green-600/90 text-white p-4 z-10">
          <div className="container mx-auto flex justify-between items-center">
            <img src="https://via.placeholder.com/150x50?text=Logo" alt="Logo" className="h-10" />
            <button className="md:hidden" onClick={() => setIsOpen(!isOpen)}>
              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={isOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} />
              </svg>
            </button>
            <nav className={`${isOpen ? 'block' : 'hidden'} md:block md:flex space-x-4 absolute md:static top-16 left-0 w-full md:w-auto bg-green-600/90 md:bg-transparent p-4 md:p-0`}>
              {['Home', 'Sobre', 'Serviços', 'Marcas', 'Testemunhos', 'Galeria', 'Financiamento', 'Contato'].map((item) => (
                <a key={item} href={`#${item.toLowerCase()}`} className="block py-2 hover:text-yellow-300" onClick={() => setIsOpen(false)}>
                  {item}
                </a>
              ))}
            </nav>
          </div>
        </header>
      );
    }

    function SolarCalculator() {
      const [kWh, setKWh] = useState('');
      const [result, setResult] = useState(null);

      const calculate = () => {
        try {
          const kWhValue = parseFloat(kWh);
          if (kWhValue > 0) {
            const kWp = (kWhValue / 130).toFixed(2);
            const cost = (kWp * 5000).toFixed(2);
            setResult({ kWp, cost });
          } else {
            alert('Insira um valor válido maior que zero!');
          }
        } catch (error) {
          console.error('Erro na calculadora:', error);
          alert('Ocorreu um erro ao calcular. Tente novamente.');
        }
      };

      return (
        <div className="p-6 max-w-md mx-auto bg-gray-100 rounded-lg shadow-md fade-in">
          <h2 className="text-2xl font-bold text-green-600 mb-4">Calcule Sua Economia</h2>
          <input
            type="number"
            value={kWh}
            onChange={(e) => setKWh(e.target.value)}
            placeholder="Consumo mensal (kWh)"
            className="border p-2 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-green-500"
          />
          <button
            onClick={calculate}
            className="bg-green-500 text-white p-2 w-full rounded hover:bg-green-600 transition"
          >
            Calcular
          </button>
          {result && (
            <div className="mt-4 text-lg">
              <p>Potência necessária: {result.kWp} kWp</p>
              <p>Custo estimado: R${result.cost}</p>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [bgImage, setBgImage] = useState('');

      useEffect(() => {
        try {
          new Swiper('.swiper', {
            loop: true,
            autoplay: { delay: 3000 },
            slidesPerView: 1,
            spaceBetween: 10,
            breakpoints: {
              640: { slidesPerView: 2 },
              1024: { slidesPerView: 3 }
            }
          });
        } catch (error) {
          console.error('Erro ao inicializar Swiper:', error);
        }

        // Randomizar imagem de fundo
        const randomImage = images[Math.floor(Math.random() * images.length)];
        setBgImage(randomImage);
      }, []);

      return (
        <div>
          <Header />
          <div>
            <section id="home" className="image-bg">
              <div className="text-center fade-in px-4 sm:px-6 lg:px-8 mt-16 sm:mt-20">
                <h1 className="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4 text-white text-shadow-lg">Energia Solar para o Futuro</h1>
                <p className="text-sm sm:text-base lg:text-lg mb-6 text-white text-shadow-md">Economize com energia limpa e sustentável.</p>
                <a href="#contato" className="bg-yellow-500 text-white px-4 py-2 sm:px-6 sm:py-3 rounded hover:bg-yellow-600 transition text-sm sm:text-base">
                  Fale Conosco
                </a>
              </div>
              <div className="mouse"></div>
            </section>
            <section className="py-12 bg-gray-50">
              <SolarCalculator />
            </section>
            <section id="sobre" className="py-12">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Sobre Nós</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <p className="text-lg">Somos líderes em energia solar, oferecendo soluções sustentáveis desde 2010. Nossa missão é tornar a energia limpa acessível, com qualidade e economia.</p>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="text-center p-4 bg-white shadow-md rounded">
                      <p className="text-2xl font-bold text-yellow-500">500+</p>
                      <p>Projetos Concluídos</p>
                    </div>
                    <div className="text-center p-4 bg-white shadow-md rounded">
                      <p className="text-2xl font-bold text-yellow-500">10 MW</p>
                      <p>Potência Instalada</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>
            <section id="servicos" className="py-12 bg-gray-50">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Nossos Serviços</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {['Instalação', 'Manutenção', 'Consultoria'].map((servico) => (
                    <div key={servico} className="p-6 bg-white shadow-md rounded text-center hover:shadow-lg transition">
                      <h3 className="text-xl font-bold text-green-600">{servico}</h3>
                      <p>Serviço de alta qualidade para sistemas solares.</p>
                      <a href="#contato" className="text-yellow-500 hover:underline">Saiba mais</a>
                    </div>
                  ))}
                </div>
              </div>
            </section>
            <section id="marcas" className="py-12">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Nossas Marcas</h2>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  {['Jinko Solar', 'Canadian Solar', 'Trina Solar', 'Longi'].map((marca) => (
                    <div key={marca} className="text-center">
                      <img src="https://via.placeholder.com/100?text=Marca" alt={marca} className="mx-auto mb-2" />
                      <p>{marca}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>
            <section id="testemunhos" className="py-12 bg-gray-50">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">O que dizem nossos clientes</h2>
                <div className="swiper">
                  <div className="swiper-wrapper">
                    {mockTestimonials.map((t, i) => (
                      <div key={i} className="swiper-slide p-6 bg-white shadow-md rounded">
                        <img src={t.foto} alt={t.nome} className="w-16 h-16 rounded-full mx-auto mb-4" />
                        <p className="italic">"{t.depoimento}"</p>
                        <p className="text-right font-bold">{t.nome}, {t.cidade}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>
            <section id="galeria" className="py-12">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Galeria de Projetos</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {['Residência SP', 'Fazenda MG', 'Empresa RJ'].map((projeto) => (
                    <div key={projeto} className="bg-white shadow-md rounded overflow-hidden">
                      <img src="https://via.placeholder.com/300x200?text=Projeto" alt={projeto} className="w-full" />
                      <p className="p-4 text-center">{projeto}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>
            <section id="financiamento" className="py-12 bg-gray-50">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Financiamento</h2>
                <p className="text-center mb-6">Oferecemos parcerias com bancos para facilitar sua instalação solar.</p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {['Banco do Brasil', 'Santander', 'Caixa'].map((banco) => (
                    <div key={banco} className="text-center p-4 bg-white shadow-md rounded">
                      <img src="https://via.placeholder.com/100?text=Banco" alt={banco} className="mx-auto mb-2" />
                      <p>{banco}</p>
                      <p className="text-sm">Taxa: 1,2% a.m.</p>
                      <a href="#" className="text-yellow-500 hover:underline">Saiba mais</a>
                    </div>
                  ))}
                </div>
              </div>
            </section>
            <section id="contato" className="py-12">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <h2 className="text-3xl font-bold text-center text-green-600 mb-6 fade-in">Contato</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <form className="p-6 bg-white shadow-md rounded">
                      <input type="text" placeholder="Nome" className="border p-2 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
                      <input type="email" placeholder="Email" className="border p-2 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
                      <input type="tel" placeholder="Telefone" className="border p-2 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
                      <textarea placeholder="Mensagem" className="border p-2 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-green-500" rows="4"></textarea>
                      <button type="button" className="bg-green-500 text-white p-2 w-full rounded hover:bg-green-600 transition">Enviar</button>
                    </form>
                  </div>
                  <div>
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.123456789!2d-46.633308!3d-23.550520!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59a8c0c!2sSão%20Paulo%2C%20SP!5e0!3m2!1spt-BR!2sbr!4v1631234567890"
                      className="w-full h-64 rounded"
                      allowFullScreen=""
                      loading="lazy"
                    />
                    <p className="mt-4">Endereço: Av. Solar, 123, São Paulo, SP</p>
                    <p>Email: contato@suaempresa.com</p>
                    <p>Telefone: (11) 99999-9999</p>
                  </div>
                </div>
              </div>
            </section>
            <footer className="bg-green-800 text-white p-6">
              <div className="container mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <h3 className="text-lg font-bold">Sua Empresa Solar</h3>
                    <p>© 2025 Todos os direitos reservados.</p>
                  </div>
                  <div>
                    <h3 className="text-lg font-bold">Links Rápidos</h3>
                    <ul>
                      {['Home', 'Sobre', 'Serviços', 'Contato'].map((item) => (
                        <li key={item}><a href={`#${item.toLowerCase()}`} className="hover:text-yellow-300">{item}</a></li>
                      ))}
                    </ul>
                  </div>
                  <div>
                    <h3 className="text-lg font-bold">Contato</h3>
                    <p>Email: contato@suaempresa.com</p>
                    <p>Telefone: (11) 99999-9999</p>
                    <p>Redes: <a href="#" className="hover:text-yellow-300">Instagram</a> | <a href="#" className="hover:text-yellow-300">WhatsApp</a></p>
                  </div>
                </div>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    try {
      console.log('React:', React);
      console.log('ReactDOM:', ReactDOM);
      console.log('Swiper:', Swiper);
      console.log('XLSX:', XLSX);
      ReactDOM.render(<App />, document.getElementById('root'));
    } catch (error) {
      console.error('Erro ao renderizar o app:', error);
      document.getElementById('root').innerHTML = `<h1>Erro: ${error.message}</h1>`;
    }
  </script>
</body>
</html>
