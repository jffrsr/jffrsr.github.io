    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #1a2525;
      color: #e5e7eb;
    }
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .image-bg {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background-color: #1a2525;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding-top: 70px;
    }
    .image-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }
    .image-bg > * {
      position: relative;
      z-index: 2;
    }
    #home {
      position: relative;
      overflow: hidden;
    }
    .mouse {
      display: none;
    }
    #home .mouse {
      display: block;
      width: 50px;
      height: 90px;
      border: 4px solid #ffffff;
      border-radius: 60px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      transition: opacity 0.3s ease;
    }
    #home .mouse::before {
      content: '';
      width: 12px;
      height: 12px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 1;
      animation: wheel 2s infinite;
    }
    @keyframes wheel {
      to {
        opacity: 0;
        top: 60px;
      }
    }
    @media (max-width: 640px) {
      .image-bg {
        padding-top: 56px;
      }
      #home .mouse {
        width: 40px;
        height: 72px;
        border-width: 3px;
        bottom: 10px;
      }
      #home .mouse::before {
        width: 10px;
        height: 10px;
        top: 8px;
      }
      @keyframes wheel {
        to {
          opacity: 0;
          top: 48px;
        }
      }
    }
    .scroll-smooth {
      scroll-behavior: smooth;
    }
    .text-shadow-lg {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .text-shadow-md {
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
    }
    .section {
      background-color: #2d3a3a;
    }
    .card {
      background-color: #2d3a3a;
      color: #e5e7eb;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    .card-content {
      background-color: transparent;
    }
    input, textarea {
      background-color: #3f4c4c;
      color: #e5e7eb;
      border-color: #4b5e5e;
    }
    input:focus, textarea:focus {

    }
    .magazine-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }
    .magazine-image {
      width: 100%;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .magazine-item:hover .magazine-image {

    .magazine-text {

        function SolarCalculator() {
          const [kWh, setKWh] = React.useState('');
          const [result, setResult] = React.useState(null);

          const calculate = () => {
            try {
              const kWhValue = parseFloat(kWh);
              if (kWhValue > 0) {
                const kWp = (kWhValue / 130).toFixed(2);
                const cost = (kWp * 5000).toFixed(2);
                setResult({ kWp, cost });
              } else {
                alert('Insira um valor válido maior que zero!');
              }
            } catch (error) {
              console.error('Erro na calculadora:', error);
              alert('Ocorreu um erro ao calcular. Tente novamente.');
            }
          };

          return React.createElement(
            'div',
            { className: 'section' },
            React.createElement(
              'div',
              { className: 'container' },
              React.createElement('h2', { className: 'title is-size-3 has-text-centered has-text-green fade-in' }, 'Calcule Sua Economia'),
              React.createElement(
                'div',

                    { className: 'field' },
                    React.createElement('label', { className: 'label' }, 'Consumo mensal (kWh)'),
                    React.createElement(
                      'div',
                      { className: 'control' },
                      React.createElement('input', {
                        type: 'number',
                        value: kWh,
                        onChange: (e) => setKWh(e.target.value),
                        placeholder: 'Ex.: 300',
                        className: 'input'
                      })
                    )
                  ),
                  React.createElement(
                    'div',
                    { className: 'field' },
                    React.createElement(
                      'div',
                      { className: 'control' },
                      React.createElement(
                        'button',
                        { onClick: calculate, className: 'button is-success is-fullwidth' },
                        'Calcular'
                      )
                    )
                  ),
                  result && React.createElement(
                    'div',
                    { className: 'content mt-4' },
                    React.createElement('p', null, `Potência necessária: ${result.kWp} kWp`),
                    React.createElement('p', null, `Custo estimado: R$${result.cost}`)
                  )
                )
              )
            )
          );
        }
