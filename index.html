    .image-bg::before {

    .mouse {

      height: 90px;
      border: 4px solid #ffffff;
      border-radius: 60px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
    }
    .mouse::before {
      content: '';
      width: 12px;
      height: 12px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 1;

    }
    @keyframes wheel {

        top: 60px;

        height: 60px;

        height: 8px;
        top: 8px;

        }

  <script type="text/javascript">
    var gk_isXlsx = false;
    var gk_xlsxFileLookup = {};
    var gk_fileData = {};
    function filledCell(cell) {
      return cell !== '' && cell != null;
    }
    function loadFileData(filename) {
      if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
        try {
          var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
          var firstSheetName = workbook.SheetNames[0];
          var worksheet = workbook.Sheets[firstSheetName];
          var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
          var filteredData = jsonData.filter(row => row.some(filledCell));
          var headerRowIndex = filteredData.findIndex((row, index) =>
            row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
          );
          if (headerRowIndex === -1 || headerRowIndex > 25) {
            headerRowIndex = 0;
          }
          var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex));
          csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
          return csv;
        } catch (e) {
          console.error('Erro no loadFileData:', e);
          return "";
        }
      }
      return gk_fileData[filename] || "";
    }

    function SolarCalculator() {
      const [kWh, setKWh] = useState('');
      const [result, setResult] = useState(null);

      const calculate = () => {
        try {
          const kWhValue = parseFloat(kWh);
          if (kWhValue > 0) {
            const kWp = (kWhValue / 130).toFixed(2);
            const cost = (kWp * 5000).toFixed(2);
            setResult({ kWp, cost });
          } else {
            alert('Insira um valor válido maior que zero!');
          }
        } catch (error) {
          console.error('Erro na calculadora:', error);
          alert('Ocorreu um erro ao calcular. Tente novamente.');
        }
      };

      return (

                      value={kWh}
                      onChange={(e) => setKWh(e.target.value)}
                      placeholder="Ex.: 300"
                      className="input"
                    />

                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }
